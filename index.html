<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIGHT 2026 Democratic Primary Countdowns</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e1a;
    --card-bg: #111827;
    --card-border: #1e293b;
    --blue: #3b82f6;
    --green: #22c55e;
    --amber: #f59e0b;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
    --search-bg: rgba(255, 255, 255, 0.05);
    --link-icon: #64748b;
    --link-icon-hover: #93c5fd;
    --map-completed: #4b5563;
    --map-default: #3b82f6;
    --map-imminent: #ef4444;
    --map-general: #8b5cf6;
    --map-untracked: rgba(255, 255, 255, 0.06);
  }

  [data-theme="light"] {
    --bg: #f0f4f8;
    --card-bg: #ffffff;
    --card-border: #e2e8f0;
    --text: #1e293b;
    --text-dim: #475569;
    --text-muted: #94a3b8;
    --search-bg: rgba(0, 0, 0, 0.04);
    --link-icon: #94a3b8;
    --link-icon-hover: #3b82f6;
    --map-untracked: rgba(0, 0, 0, 0.06);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }
  [data-theme="light"] .bg-grid {
    background-image:
      linear-gradient(rgba(59, 130, 246, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59, 130, 246, 0.06) 1px, transparent 1px);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    padding: 0 1.5rem 3rem;
  }

  header {
    text-align: center;
    padding: 3rem 1rem 1.5rem;
    position: relative; z-index: 1;
  }

  header h1 {
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 800;
    background: linear-gradient(135deg, #3b82f6, #60a5fa, #93c5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }

  header p {
    color: var(--text-dim);
    margin-top: 0.5rem;
    font-size: 1.05rem;
  }

  .controls {
    display: flex; justify-content: center; align-items: center;
    gap: 1rem; margin-top: 1rem; flex-wrap: wrap;
  }

  .tz-picker, .race-filter {
    display: flex; align-items: center; gap: 0.5rem;
    font-size: 0.92rem; color: var(--text-dim);
  }

  .tz-picker select, .race-filter select {
    background: var(--card-bg); color: var(--text);
    border: 1px solid var(--card-border); border-radius: 8px;
    padding: 0.35rem 0.6rem; font-family: inherit;
    font-size: 0.92rem; cursor: pointer; outline: none;
    transition: background 0.3s, color 0.3s, border-color 0.3s;
  }
  .tz-picker select:focus, .race-filter select:focus { border-color: var(--blue); }

  .theme-toggle {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 8px; padding: 0.35rem 0.55rem; cursor: pointer;
    font-size: 1rem; line-height: 1; color: var(--text-dim);
    transition: background 0.3s, border-color 0.3s;
  }
  .theme-toggle:hover { border-color: var(--blue); }

  .search-bar {
    display: flex; align-items: center; gap: 0.5rem;
    margin-top: 0.75rem; justify-content: center;
  }
  .search-bar input {
    background: var(--search-bg); border: 1px solid var(--card-border);
    border-radius: 10px; padding: 0.5rem 1rem; font-family: inherit;
    font-size: 0.92rem; color: var(--text); width: 300px; max-width: 90vw;
    outline: none; transition: border-color 0.2s, background 0.3s;
  }
  .search-bar input::placeholder { color: var(--text-muted); }
  .search-bar input:focus { border-color: var(--blue); }
  .search-clear {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 1rem; padding: 0.2rem; display: none;
  }
  .search-clear.visible { display: block; }

  .legend {
    display: flex; gap: 1.2rem; flex-wrap: wrap;
  }
  .legend span {
    display: flex; align-items: center; gap: 0.35rem;
    font-size: 0.88rem; color: var(--text-muted);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.upcoming { background: var(--blue); }
  .dot.imminent { background: var(--amber); }
  .dot.passed { background: var(--green); }

  /* Hero card */
  .hero-card {
    background: var(--card-bg);
    border: 1px solid rgba(59, 130, 246, 0.3);
    border-radius: 20px; padding: 2rem; margin-bottom: 2rem;
    position: relative; overflow: hidden;
    box-shadow: 0 8px 40px rgba(59, 130, 246, 0.08);
    transition: background 0.3s, border-color 0.3s;
  }
  .hero-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b);
    animation: pulse-bar 2s ease-in-out infinite;
  }
  @keyframes pulse-bar { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }

  .hero-label {
    font-size: 0.85rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--amber); margin-bottom: 0.75rem;
  }
  .hero-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem;
  }
  .hero-state { font-size: 2rem; font-weight: 800; color: var(--text); }
  .hero-weeks { font-size: 0.95rem; color: var(--text-muted); font-weight: 500; margin-top: 0.25rem; }
  .hero-date {
    background: rgba(245, 158, 11, 0.12); color: #fbbf24;
    border: 1px solid rgba(245, 158, 11, 0.25);
    padding: 0.4rem 0.9rem; border-radius: 10px;
    font-size: 0.9rem; font-weight: 600;
  }
  [data-theme="light"] .hero-date { background: rgba(245, 158, 11, 0.08); color: #d97706; border-color: rgba(245, 158, 11, 0.3); }

  .hero-state-group { margin-bottom: 0.6rem; }
  .hero-state-name { font-size: 1.2rem; font-weight: 700; color: var(--text); margin-bottom: 0.15rem; }
  .hero-candidates { margin-bottom: 0.5rem; }
  .hero-context { font-size: 0.88rem; color: var(--text-muted); font-style: italic; margin-bottom: 0.5rem; line-height: 1.4; }

  .hero-countdown { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
  .hero-countdown .countdown-unit {
    flex: 1; text-align: center;
    background: rgba(0, 0, 0, 0.35); border-radius: 12px;
    padding: 0.8rem 0.5rem; max-width: 120px;
  }
  [data-theme="light"] .hero-countdown .countdown-unit { background: rgba(0, 0, 0, 0.04); }
  .hero-countdown .countdown-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.2rem; font-weight: 700; color: var(--text); line-height: 1;
  }
  .hero-countdown .countdown-label {
    font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.08em; margin-top: 0.3rem;
  }

  .hero-progress { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.06); border-radius: 4px; overflow: hidden; }
  [data-theme="light"] .hero-progress { background: rgba(0, 0, 0, 0.06); }
  .hero-progress .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--amber), #fbbf24); transition: width 1s linear; }

  /* Sections */
  .section { margin-bottom: 2rem; }
  .section-title {
    font-size: 1.1rem; font-weight: 700; color: var(--text-dim);
    margin-bottom: 1rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--card-border);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .section-count {
    background: rgba(59, 130, 246, 0.12); color: #93c5fd;
    font-size: 0.85rem; padding: 0.15rem 0.5rem; border-radius: 10px; font-weight: 600;
  }
  [data-theme="light"] .section-count { background: rgba(59, 130, 246, 0.08); color: #2563eb; }

  /* Cards */
  .card-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 0.85rem;
  }
  .card {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 1rem 1.15rem;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background 0.3s;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--blue), #60a5fa); opacity: 0.5;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(59, 130, 246, 0.08);
    border-color: rgba(59, 130, 246, 0.25);
  }
  .card.passed { opacity: 0.5; }
  .card.passed::before { background: linear-gradient(90deg, var(--green), #4ade80); }

  .card-date-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.6rem; padding-bottom: 0.5rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }
  [data-theme="light"] .card-date-header { border-bottom-color: rgba(0, 0, 0, 0.06); }
  .card-date-text { font-size: 0.9rem; font-weight: 600; color: #93c5fd; }
  [data-theme="light"] .card-date-text { color: #2563eb; }

  .card-state-group { margin-bottom: 0.5rem; }
  .card-state-group:last-of-type { margin-bottom: 0.6rem; }
  .card-state { font-size: 1.1rem; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 0.15rem; }
  .card-context { font-size: 0.82rem; color: var(--text-muted); font-style: italic; margin-bottom: 0.25rem; line-height: 1.3; }
  .card-candidates { min-height: 0; }

  .candidate {
    font-size: 0.9rem; color: var(--text-dim); line-height: 1.5;
    display: flex; align-items: center; gap: 0.4rem;
    flex-wrap: wrap; padding: 0.15rem 0;
  }
  .candidate-office { color: var(--text-muted); font-size: 0.82rem; }

  .candidate-links {
    display: inline-flex; gap: 0.45rem; margin-left: 0.2rem;
  }
  .candidate-links a {
    color: var(--link-icon); text-decoration: none;
    opacity: 0.7; transition: opacity 0.15s, color 0.15s;
    line-height: 1; display: inline-flex; align-items: center;
    padding: 2px;
  }
  .candidate-links a:hover { color: var(--link-icon-hover); opacity: 1; }

  .voting-info {
    font-size: 0.8rem; color: var(--text-muted); line-height: 1.4;
    margin-top: 0.3rem; display: flex; align-items: center; gap: 0.3rem;
  }
  .voting-info svg { flex-shrink: 0; }

  .card-bottom {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 0.4rem; border-top: 1px solid rgba(255, 255, 255, 0.04);
  }
  [data-theme="light"] .card-bottom { border-top-color: rgba(0, 0, 0, 0.05); }

  .days-count { display: flex; align-items: baseline; gap: 0.3rem; }
  .days-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.6rem; font-weight: 700; color: var(--text); line-height: 1;
  }
  .days-label {
    font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.05em; font-weight: 600;
  }
  .weeks-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
  .passed-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem; font-weight: 700; color: var(--green); letter-spacing: 0.05em;
  }

  /* General election */
  .general-section { margin-top: 2.5rem; }
  .general-section .section-title { color: var(--amber); border-bottom-color: rgba(245, 158, 11, 0.2); }
  .general-section .section-count { background: rgba(245, 158, 11, 0.12); color: #fbbf24; }
  [data-theme="light"] .general-section .section-count { color: #d97706; }

  .general-card {
    background: var(--card-bg); border: 1px solid rgba(245, 158, 11, 0.15);
    border-radius: 16px; padding: 1.25rem 1.5rem;
    position: relative; overflow: hidden; transition: background 0.3s;
  }
  .general-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--amber), #fbbf24); opacity: 0.5;
  }
  .general-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem;
  }
  .general-title { font-size: 1.3rem; font-weight: 800; color: var(--text); }
  .general-date-badge {
    background: rgba(245, 158, 11, 0.1); color: #fbbf24;
    border: 1px solid rgba(245, 158, 11, 0.2);
    padding: 0.3rem 0.7rem; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
  }
  [data-theme="light"] .general-date-badge { color: #d97706; }
  .general-candidates { margin-bottom: 0.75rem; }
  .general-candidate {
    font-size: 0.95rem; color: var(--text-dim); line-height: 1.6;
    display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
  }
  .general-countdown { display: flex; align-items: baseline; gap: 0.4rem; }
  .general-days-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem; font-weight: 700; color: var(--amber); line-height: 1;
  }
  .general-days-label { font-size: 0.9rem; color: var(--text-muted); font-weight: 600; }
  .general-weeks { font-size: 0.9rem; color: var(--text-muted); margin-left: 0.5rem; }

  .no-results { text-align: center; color: var(--text-muted); padding: 3rem 1rem; font-size: 0.95rem; }

  /* Map */
  .map-toggle {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 8px; padding: 0.35rem 0.7rem; cursor: pointer;
    font-size: 0.88rem; color: var(--text-dim); font-family: inherit;
    transition: background 0.3s, border-color 0.3s;
    display: inline-flex; align-items: center; gap: 0.3rem;
  }
  .map-toggle:hover { border-color: var(--blue); }
  .map-section {
    max-width: 960px; margin: 0 auto 1.5rem; padding: 0 1.5rem;
    position: relative; z-index: 1;
  }
  .map-section.collapsed { display: none; }
  .map-container { position: relative; }
  .map-svg { width: 100%; height: auto; display: block; }
  .map-svg path { fill: var(--map-untracked); stroke: var(--bg); stroke-width: 1.5; transition: fill 0.2s, filter 0.2s; }
  .map-svg path.tracked { cursor: pointer; }
  .map-svg path.tracked:hover { filter: brightness(1.25); }
  .map-svg circle.tracked { cursor: pointer; }
  .map-svg circle.tracked:hover { filter: brightness(1.25); }
  .map-tooltip {
    position: absolute; pointer-events: none; opacity: 0;
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 10px; padding: 0.6rem 0.9rem;
    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    font-size: 0.85rem; color: var(--text); z-index: 10;
    transition: opacity 0.15s; white-space: nowrap; max-width: 280px;
  }
  .map-tooltip.visible { opacity: 1; }
  .map-tooltip .tt-state { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.2rem; }
  .map-tooltip .tt-date { color: var(--text-dim); }
  .map-tooltip .tt-days { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--amber); }
  .map-legend {
    display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
    margin-top: 0.75rem; font-size: 0.82rem; color: var(--text-muted);
  }
  .map-legend span { display: flex; align-items: center; gap: 0.3rem; }
  .map-legend .mdot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  footer {
    text-align: center; padding: 2rem 1rem 3rem;
    color: var(--text-muted); font-size: 0.88rem;
    position: relative; z-index: 1;
  }
  footer a { color: var(--text-dim); text-decoration: none; }
  footer a:hover { color: var(--blue); }

  @media (max-width: 640px) {
    .container { padding: 0 0.75rem 2rem; }
    header { padding: 2rem 0.75rem 1rem; }
    .hero-card { padding: 1.25rem; }
    .hero-state { font-size: 1.5rem; }
    .hero-countdown .countdown-num { font-size: 1.6rem; }
    .card-grid { grid-template-columns: 1fr; }
    .controls { gap: 0.75rem; }
    .search-bar input { width: 100%; }
    .map-section { padding: 0 0.75rem; }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<header>
  <h1>FIGHT 2026 Democratic Primary Countdowns</h1>
  <p>Track candidates and countdowns to every primary</p>
  <div class="controls">
    <div class="tz-picker">
      <label for="tz-select">Timezone:</label>
      <select id="tz-select">
        <option value="America/New_York">EST</option>
        <option value="America/Chicago">CST</option>
        <option value="America/Denver">MST</option>
        <option value="America/Los_Angeles">PST</option>
      </select>
    </div>
    <div class="race-filter">
      <label for="race-select">Race:</label>
      <select id="race-select">
        <option value="all">All Races</option>
        <option value="senate">US Senate</option>
        <option value="house">US House</option>
        <option value="governor">Governor</option>
        <option value="stateleg">State Legislature</option>
        <option value="statewide">Statewide</option>
      </select>
    </div>
    <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">&#9790;</button>
    <button class="map-toggle" id="map-toggle" title="Toggle map">Map &#9660;</button>
    <div class="legend">
      <span><span class="dot upcoming"></span> Upcoming</span>
      <span><span class="dot imminent"></span> Within 7 days</span>
      <span><span class="dot passed"></span> Completed</span>
    </div>
  </div>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search states, candidates, or offices...">
    <button class="search-clear" id="search-clear">&times;</button>
  </div>
</header>

<div class="map-section" id="map-section">

// Group primaries by date
function groupByDate(entries) {
  const groups = [], map = {};
  entries.forEach(p => {
    if (!map[p.date]) { map[p.date] = { date: p.date, states: [] }; groups.push(map[p.date]); }
    map[p.date].states.push({ state: p.state, candidates: p.candidates, context: p.context, earlyVote: p.earlyVote, mailIn: p.mailIn });
  });
  return groups;
}

function initTheme() {
  const saved = localStorage.getItem("pc-theme");
  if (saved) { document.documentElement.setAttribute("data-theme", saved); updateThemeIcon(saved); }
}
function toggleTheme() {
  const current = document.documentElement.getAttribute("data-theme");
  const next = current === "light" ? "dark" : "light";
  if (next === "dark") document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme", "light");
  localStorage.setItem("pc-theme", next);
  updateThemeIcon(next);
}
function updateThemeIcon(theme) {
  document.getElementById("theme-toggle").innerHTML = theme === "light" ? "&#9728;" : "&#9790;";
}

// Click the "Completed" legend dot 5 times to toggle showing eliminated candidates
(function() {
  const dots = document.querySelectorAll(".legend .dot.passed");
  if (!dots.length) return;
  const target = dots[0].parentElement;
  let clicks = 0, timer;
  target.style.cursor = "default";
  target.addEventListener("click", function() {
    clicks++;
    clearTimeout(timer);
    if (clicks === 5) {
      clicks = 0;
      showEliminated = !showEliminated;
      render();
    }
    timer = setTimeout(() => { clicks = 0; }, 800);
  });
})();

function getTargetTime(dateStr) {
  const utcMidnight = new Date(dateStr + "T00:00:00Z");
  const tzMidnight = new Date(utcMidnight.toLocaleString("en-US", { timeZone: selectedTz }));
  return utcMidnight.getTime() + (utcMidnight.getTime() - tzMidnight.getTime());
}

function formatDateShort(dateStr) {
  return new Date(dateStr + "T12:00:00Z").toLocaleDateString("en-US", { month: "short", day: "numeric", timeZone: "UTC" });
}
function formatDateLong(dateStr) {
  return new Date(dateStr + "T12:00:00Z").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric", timeZone: "UTC" });
}
function getDaysRemaining(dateStr, now) {
  return Math.ceil((getTargetTime(dateStr) - now) / (1000 * 60 * 60 * 24));
}
function getMonth(dateStr) {
  return new Date(dateStr + "T12:00:00Z").getUTCMonth();
}
function weeksOutText(days) {
  if (days <= 0) return "";
  const weeks = Math.ceil(days / 7);
  return `${weeks} week${weeks !== 1 ? 's' : ''} out`;
}

function candidateMatchesRace(c) {
  if (raceFilter === "all") return true;
  const o = c.office.toLowerCase();
  switch (raceFilter) {
    case "senate": return o.includes("us senate");
    case "house": return o.includes("us house") || o.includes("house delegate");
    case "governor": return o.includes("governor");
    case "stateleg": return o.includes("state house") || o.includes("state senate");
    case "statewide": return o.includes("attorney general") || o.includes("comptroller") || o.includes("supreme court") || o.includes("insurance commissioner");
    default: return true;
  }
}

function renderLinks(c) {
  let links = "";
  if (c.web) links += `<a href="${c.web}" target="_blank" title="Website">${ICONS.web}</a>`;
  if (c.x) links += `<a href="${c.x}" target="_blank" title="X">${ICONS.x}</a>`;
  if (c.ig) links += `<a href="${c.ig}" target="_blank" title="Instagram">${ICONS.ig}</a>`;
  if (c.tk) links += `<a href="${c.tk}" target="_blank" title="TikTok">${ICONS.tk}</a>`;
  if (c.yt) links += `<a href="${c.yt}" target="_blank" title="YouTube">${ICONS.yt}</a>`;
  if (c.fb) links += `<a href="${c.fb}" target="_blank" title="Facebook">${ICONS.fb}</a>`;
  return links ? `<span class="candidate-links">${links}</span>` : "";
}

function renderCandidateList(candidates) {
  let filtered = raceFilter === "all" ? candidates : candidates.filter(candidateMatchesRace);
  if (!showEliminated) filtered = filtered.filter(c => !c.eliminated);
  const visibleNonEliminated = candidates.filter(c => !c.eliminated);
  if (filtered.length === 0 && visibleNonEliminated.length === 0 && candidates.length > 0) {
    return ""; // all candidates eliminated, hide state entirely
  }
  if (filtered.length === 0 && candidates.length === 0) {
    return `<div class="candidate" style="color: var(--text-muted); font-style: italic;">Candidates TBD</div>`;
  }
  if (filtered.length === 0) return "";
  return filtered.map(c =>
    `<div class="candidate">${c.name} <span class="candidate-office">&mdash; ${c.office}</span>${renderLinks(c)}</div>`
  ).join("");
}

function renderVotingInfo(s, isPassed) {
  if (isPassed) return "";
  let parts = [];
  if (s.earlyVote) parts.push(`Early vote: ${s.earlyVote}`);
  if (s.mailIn) parts.push(`Mail-in: ${s.mailIn}`);
  if (parts.length === 0) return "";
  return `<div class="voting-info">${ICONS.ballot} ${parts.join(" · ")}</div>`;
}

function renderStatesForCard(states, isPassed) {
  return states.map(s => {
    const ctx = s.context ? `<div class="card-context">${s.context}</div>` : "";
    const candidateHtml = renderCandidateList(s.candidates);
    if (!candidateHtml) return "";
    return `
      <div class="card-state-group" data-state="${s.state}">
        <div class="card-state">${s.state}</div>
        ${ctx}
        <div class="card-candidates">${candidateHtml}</div>
        ${renderVotingInfo(s, isPassed)}
      </div>
    `;
  }).join("");
}

function groupMatchesSearch(g) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  for (const s of g.states) {
    if (s.state.toLowerCase().includes(q)) return true;
    const visibleCandidates = showEliminated ? s.candidates : s.candidates.filter(c => !c.eliminated);
    for (const c of visibleCandidates) {
      if (c.name.toLowerCase().includes(q) || c.office.toLowerCase().includes(q)) return true;
    }
  }
  return false;
}

function groupMatchesRaceFilter(g) {
  if (raceFilter === "all") return true;
  for (const s of g.states) {
    const visible = showEliminated ? s.candidates : s.candidates.filter(c => !c.eliminated);
    if (visible.some(candidateMatchesRace)) return true;
  }
  return false;
}

function groupHasVisibleCandidates(g) {
  for (const s of g.states) {
    const visible = showEliminated ? s.candidates : s.candidates.filter(c => !c.eliminated);
    if (visible.length > 0) return true;
  }
  return false;
}

function render() {
  const now = Date.now();
  const app = document.getElementById("app");
  const currentMonth = new Date().getMonth();
  const currentYear = new Date().getFullYear();

  let heroGroup = null;
  const otherGroups = [];

  for (const g of primaryGroups) {
    const days = getDaysRemaining(g.date, now);
    if (!heroGroup && days > 0 && groupMatchesSearch(g) && groupMatchesRaceFilter(g) && groupHasVisibleCandidates(g)) {
      heroGroup = { ...g, days };
    } else {
      otherGroups.push({ ...g, days });
    }
  }

  const passed = [], thisMonth = [], upcoming = [], later = [];
  otherGroups.forEach(g => {
    const pMonth = getMonth(g.date);
    const pYear = new Date(g.date + "T12:00:00Z").getUTCFullYear();
    if (g.days <= 0) passed.push(g);
    else if (pMonth === currentMonth && pYear === currentYear) thisMonth.push(g);
    else if (g.days <= 90) upcoming.push(g);
    else later.push(g);
  });

  let html = "";
  let anyVisible = false;

  // Hero card
  if (heroGroup) {
    anyVisible = true;
    const target = getTargetTime(heroGroup.date);
    const diff = Math.max(0, target - now);
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);
    const totalSpan = target - progressStart;
    const elapsed = now - progressStart;
    const pct = Math.min(100, Math.max(0, (elapsed / totalSpan) * 100));
    const stateNames = heroGroup.states.map(s => s.state).join(", ");
    const heroWeeks = weeksOutText(heroGroup.days);

    const heroStatesHtml = heroGroup.states.map(s => {
      const ctx = s.context ? `<div class="hero-context">${s.context}</div>` : "";
      return `
        <div class="hero-state-group">
          <div class="hero-state-name">${s.state}</div>
          ${ctx}
          <div class="hero-candidates">${renderCandidateList(s.candidates)}</div>
          ${renderVotingInfo(s, false)}
        </div>
      `;
    }).join("");

    html += `
      <div class="hero-card">
        <div class="hero-label">Next Primary &mdash; ${formatDateLong(heroGroup.date)}</div>
        <div class="hero-header">
          <div>
            <div class="hero-state">${stateNames}</div>
            ${heroWeeks ? `<div class="hero-weeks">${heroWeeks}</div>` : ""}
          </div>
          <div class="hero-date">${heroGroup.days} day${heroGroup.days !== 1 ? 's' : ''} away</div>
        </div>
        ${heroStatesHtml}
        <div class="hero-countdown">
          <div class="countdown-unit"><div class="countdown-num">${String(days).padStart(2, '0')}</div><div class="countdown-label">Days</div></div>
          <div class="countdown-unit"><div class="countdown-num">${String(hours).padStart(2, '0')}</div><div class="countdown-label">Hours</div></div>
          <div class="countdown-unit"><div class="countdown-num">${String(minutes).padStart(2, '0')}</div><div class="countdown-label">Min</div></div>
          <div class="countdown-unit"><div class="countdown-num">${String(seconds).padStart(2, '0')}</div><div class="countdown-label">Sec</div></div>
        </div>
        <div class="hero-progress"><div class="progress-fill" style="width: ${pct}%"></div></div>
      </div>
    `;
  }

  function renderSection(title, groups) {
    const visible = groups.filter(g => groupMatchesSearch(g) && groupMatchesRaceFilter(g) && groupHasVisibleCandidates(g));
    if (visible.length === 0) return "";
    anyVisible = true;
    const totalStates = visible.reduce((sum, g) => {
      return sum + g.states.filter(s => {
        const vc = showEliminated ? s.candidates : s.candidates.filter(c => !c.eliminated);
        return vc.length > 0;
      }).length;
    }, 0);
    let s = `<div class="section">`;
    s += `<div class="section-title">${title} <span class="section-count">${totalStates} state${totalStates !== 1 ? 's' : ''}</span></div>`;
    s += `<div class="card-grid">`;
    visible.forEach(g => {
      const isPassed = g.days <= 0;
      const weeks = weeksOutText(g.days);
      const statesHtml = renderStatesForCard(g.states, isPassed);
      if (!statesHtml.trim()) return;

      s += `<div class="card${isPassed ? ' passed' : ''}">`;
      s += `<div class="card-date-header"><div class="card-date-text">${formatDateShort(g.date)}</div></div>`;
      s += statesHtml;
      s += `<div class="card-bottom">`;
      if (isPassed) {
        s += `<span class="passed-label">COMPLETE</span>`;
      } else {
        s += `<div class="days-count"><span class="days-num">${g.days}</span><span class="days-label">days</span></div>`;
        if (weeks) s += `<span class="weeks-label">${weeks}</span>`;
      }
      s += `</div></div>`;
    });
    s += `</div></div>`;
    return s;
  }

  html += renderSection("Completed", passed);
  html += renderSection("This Month", thisMonth);
  html += renderSection("Upcoming", upcoming);
  html += renderSection("Later This Year", later);

  // General Election
  const geMatch = !searchQuery ||
    generalElection.candidates.some(c =>
      c.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
      c.state.toLowerCase().includes(searchQuery.toLowerCase()) ||
      c.office.toLowerCase().includes(searchQuery.toLowerCase())
    ) || "general election".includes(searchQuery.toLowerCase());

  const geRaceMatch = raceFilter === "all" || generalElection.candidates.some(candidateMatchesRace);

  if (geMatch && geRaceMatch) {
    anyVisible = true;
    const geDays = getDaysRemaining(generalElection.date, now);
    const geWeeks = weeksOutText(geDays);
    const filteredGeCands = raceFilter === "all" ? generalElection.candidates : generalElection.candidates.filter(candidateMatchesRace);
    html += `
      <div class="section general-section">
        <div class="section-title">General Election <span class="section-count">${filteredGeCands.length}</span></div>
        <div class="general-card" data-state="Texas">
          <div class="general-header">
            <div class="general-title">November 3, 2026</div>
            <div class="general-date-badge">Election Day</div>
          </div>
          <div class="general-candidates">
            ${filteredGeCands.map(c =>
              `<div class="general-candidate">${c.name} <span class="candidate-office">&mdash; ${c.state}, ${c.office}</span>${renderLinks(c)}</div>`
            ).join("")}
          </div>
          <div class="general-countdown">
            <span class="general-days-num">${Math.max(0, geDays)}</span>
            <span class="general-days-label">days until General Election</span>
            ${geWeeks ? `<span class="general-weeks">(${geWeeks})</span>` : ""}
          </div>
        </div>
      </div>
    `;
  }

  if (!anyVisible) html += `<div class="no-results">No results for "${searchQuery}"</div>`;
  app.innerHTML = html;
  if (typeof updateMap === "function") updateMap();
}

const STATE_ABBREV = {
  "Mississippi": "MS", "Illinois": "IL", "Ohio": "OH", "Nebraska": "NE",
  "Georgia": "GA", "Pennsylvania": "PA", "California": "CA", "Maine": "ME",
  "Washington, D.C.": "DC", "Utah": "UT", "New York": "NY", "Colorado": "CO",
  "Michigan": "MI", "Tennessee": "TN", "Wisconsin": "WI", "Alaska": "AK",
  "Florida": "FL", "New Jersey": "NJ", "Texas": "TX"
};

const mapTooltip = document.getElementById("map-tooltip");
const mapSvg = document.getElementById("us-map");
const mapSection = document.getElementById("map-section");
const mapToggleBtn = document.getElementById("map-toggle");
let mapTapState = null; // for mobile double-tap

function updateMap() {
  const now = Date.now();
  // Reset all paths
  mapSvg.querySelectorAll("path").forEach(p => {
    p.classList.remove("tracked");
    p.style.fill = "";
  });
  const dcDot = document.getElementById("DC-dot");
  if (dcDot) { dcDot.classList.remove("tracked"); dcDot.style.fill = ""; }

  // Color primary states
  primaries.forEach(p => {
    const abbr = STATE_ABBREV[p.state];
    if (!abbr) return;
    const visibleCands = showEliminated ? p.candidates : p.candidates.filter(c => !c.eliminated);
    if (visibleCands.length === 0) return;
    const days = getDaysRemaining(p.date, now);
    let color;
    if (days <= 0) color = "var(--map-completed)";
    else if (days <= 30) color = "var(--map-imminent)";
    else color = "var(--map-default)";

    const el = mapSvg.getElementById(abbr);
    if (el) { el.style.fill = color; el.classList.add("tracked"); }
    // DC special handling
    if (abbr === "DC" && dcDot) {
      dcDot.style.fill = color;
      dcDot.classList.add("tracked");
    }
  });

  // Color general election states (only if not already a primary state with visible candidates)
  generalElection.candidates.forEach(c => {
    const abbr = STATE_ABBREV[c.state];
    if (!abbr) return;
    const alreadyPrimary = primaries.some(p => {
      if (STATE_ABBREV[p.state] !== abbr) return false;
      const vc = showEliminated ? p.candidates : p.candidates.filter(x => !x.eliminated);
      return vc.length > 0;
    });
    if (alreadyPrimary) return;
    const el = mapSvg.getElementById(abbr);
    if (el) { el.style.fill = "var(--map-general)"; el.classList.add("tracked"); }
  });
}

// Tooltip
function getStateInfo(stateName) {
  // Check primaries
  for (const p of primaries) {
    if (p.state === stateName) {
      const visibleCands = showEliminated ? p.candidates : p.candidates.filter(c => !c.eliminated);
      if (visibleCands.length === 0) break;
      const days = getDaysRemaining(p.date, Date.now());
      return {
        state: p.state,
        date: formatDateLong(p.date),
        days,
        candidates: visibleCands.length,
        type: "primary"
      };
    }
  }
  // Check general election
  for (const c of generalElection.candidates) {
    if (c.state === stateName) {
      const days = getDaysRemaining(generalElection.date, Date.now());
      const geCands = generalElection.candidates.filter(gc => gc.state === stateName);
      return {
        state: stateName,
        date: formatDateLong(generalElection.date),
        days,
        candidates: geCands.length,
        type: "general"
      };
    }
  }
  return null;
}

function getStateNameFromAbbr(abbr) {
  for (const [name, ab] of Object.entries(STATE_ABBREV)) {
    if (ab === abbr) return name;
  }
  return null;
}

function showTooltip(e, stateName) {
  const info = getStateInfo(stateName);
  if (!info) return;
  const label = info.type === "general" ? "General Election" : "Primary";
  const daysText = info.days <= 0 ? "Completed" : `<span class="tt-days">${info.days} days</span>`;
  mapTooltip.innerHTML = `
    <div class="tt-state">${info.state}</div>
    <div class="tt-date">${label}: ${info.date}</div>
    <div>${daysText} &middot; ${info.candidates} candidate${info.candidates !== 1 ? 's' : ''}</div>
  `;
  mapTooltip.classList.add("visible");
  positionTooltip(e);
}

function positionTooltip(e) {
  const container = mapSvg.closest(".map-container");
  const rect = container.getBoundingClientRect();
  let x = e.clientX - rect.left + 12;
  let y = e.clientY - rect.top - 10;
  const ttRect = mapTooltip.getBoundingClientRect();
  if (x + ttRect.width > rect.width) x = x - ttRect.width - 24;
  if (y + ttRect.height > rect.height) y = rect.height - ttRect.height;
  if (y < 0) y = 0;
  mapTooltip.style.left = x + "px";
  mapTooltip.style.top = y + "px";
}

function hideTooltip() {
  mapTooltip.classList.remove("visible");
}

// Mouse events on SVG
mapSvg.addEventListener("mousemove", function(e) {
  const target = e.target.closest(".tracked");
  if (!target) { hideTooltip(); return; }
  const abbr = target.id === "DC-dot" ? "DC" : target.id;
  const stateName = getStateNameFromAbbr(abbr);
  if (stateName) showTooltip(e, stateName);
  else hideTooltip();
});

mapSvg.addEventListener("mouseleave", hideTooltip);

// Click to scroll
mapSvg.addEventListener("click", function(e) {
  const target = e.target.closest(".tracked");
  if (!target) return;
  const abbr = target.id === "DC-dot" ? "DC" : target.id;
  const stateName = getStateNameFromAbbr(abbr);
  if (!stateName) return;

  // Mobile: first tap shows tooltip, second tap scrolls
  if ("ontouchstart" in window) {
    if (mapTapState === stateName) {
      mapTapState = null;
      scrollToState(stateName);
    } else {
      mapTapState = stateName;
    }
    return;
  }
  scrollToState(stateName);
});

function scrollToState(stateName) {
  // Try hero card first
  const heroGroup = document.querySelector(".hero-state-group");
  if (heroGroup) {
    const heroState = heroGroup.querySelector(".hero-state-name");
    if (heroState && heroState.textContent === stateName) {
      document.querySelector(".hero-card").scrollIntoView({ behavior: "smooth", block: "center" });
      return;
    }
  }
  // Try card state groups
  const el = document.querySelector(`[data-state="${stateName}"]`);
  if (el) {
    el.scrollIntoView({ behavior: "smooth", block: "center" });
    // Brief highlight
    const card = el.closest(".card, .general-card");
    if (card) {
      card.style.boxShadow = "0 0 0 2px var(--blue)";
      setTimeout(() => card.style.boxShadow = "", 1500);
    }
  } else {
    // General election - scroll to general section
    const generalCard = document.querySelector(".general-card");
    if (generalCard) generalCard.scrollIntoView({ behavior: "smooth", block: "center" });
  }
}

// Map toggle
let mapVisible = window.innerWidth >= 768;
function updateMapVisibility() {
  mapSection.classList.toggle("collapsed", !mapVisible);
  mapToggleBtn.innerHTML = mapVisible ? "Map &#9650;" : "Map &#9660;";
}
updateMapVisibility();

mapToggleBtn.addEventListener("click", function() {
  mapVisible = !mapVisible;
  updateMapVisibility();
});

render();
setInterval(render, 1000);
</script>
</body>
</html>
